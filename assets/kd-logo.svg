  <rect x="130" y="120" width="40" height="40"/>
  <rect x="170" y="80" width="40" height="40"/>
  <rect x="90" y="260" width="40" height="40"/>
  <rect x="130" y="300" width="40" height="40"/>
  <rect x="170" y="340" width="40" height="40"/>
  <rect x="170" y="380" width="40" height="40"/>
</g>
<!-- K green -->
<g fill="#C6FF00">
  <rect x="50" y="40" width="40" height="400"/>
  <rect x="90" y="160" width="40" height="40"/>
  <rect x="130" y="120" width="40" height="40"/>
  <rect x="170" y="80" width="40" height="40"/>
  <rect x="90" y="260" width="40" height="40"/>
  <rect x="130" y="300" width="40" height="40"/>
  <rect x="170" y="340" width="40" height="40"/>
  <rect x="170" y="380" width="40" height="40"/>
</g>

<!-- D shadow -->
<g fill="#0a0a0a" transform="translate(5,5)">
  <rect x="230" y="40" width="40" height="400"/>
  <rect x="270" y="40" width="60" height="40"/>
  <rect x="330" y="80" width="40" height="40"/>
  <rect x="370" y="120" width="40" height="40"/>
