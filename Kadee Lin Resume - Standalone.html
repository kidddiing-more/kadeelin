案中<\u002Fa>\n        <a href=\"#experience\" style=\"text-decoration:none;font-size:14px;font-weight:500;padding:6px 10px;border-radius:999px;white-space:nowrap;color:#0a0a0a;\">工作經歷<\u002Fa>\n        <a href=\"#projects\" style=\"text-decoration:none;font-size:14px;font-weight:500;padding:6px 10px;border-radius:999px;white-space:nowrap;color:#0a0a0a;\">音樂專案<\u002Fa>\n        <a href=\"#works\" style=\"text-decoration:none;font-size:14px;font-weight:500;padding:6px 10px;border-radius:999px;white-space:nowrap;color:#0a0a0a;\">作品<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <header id=\"top\" data-screen-label=\"Hero\" style=\"max-width:960px;margin:0 auto;padding:56px 20px 24px;scroll-margin-top:72px;\">\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:28px;\">\n      <div style=\"flex:1 1 300px;min-width:260px;\">\n        <p style=\"margin:0 0 14px;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:#5a5a52;\">Taipei, TW · 1985<\u002Fp>\n        <h1 style=\"margin:0;font-weight:900;font-size:clamp(40px,8vw,72px);line-height:1.02;letter-spacing:-0.02em;\">\n          林子歡\n          <span style=\"display:inline-block;background:linear-gradient(transparent 58%,#C6FF00 58%);padding:0 4px;\">Kadee&nbsp;Lin<\u002Fspan>\n        <\u002Fh1>\n        <p style=\"margin:18px 0 0;font-size:clamp(14px,1.8vw,17px);font-weight:500;color:#3a3a34;\">Music Industry&nbsp;·&nbsp;Content Strategy&nbsp;·&nbsp;Project Leadership<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:none;display:block;width:clamp(120px,18vw,168px);height:clamp(120px,18vw,168px);border-radius:50%;object-fit:cover;border:3px solid #C6FF00;background:#fff;background-image:url('data:image/svg+xml;utf8,&lt;svg xmlns=\" http:=\"\" www.w3.org=\"\" 2000=\"\" svg\"=\"\" viewbox=\"0 0 168 168\"><circle cx=\"84\" cy=\"84\" r=\"84\" fill=\"%23f4f4f0\">');background-size:cover;\"&gt;<\u002Fcircle><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ABOUT -->\n  <section id=\"about\" data-screen-label=\"About\" style=\"max-width:960px;margin:0 auto;padding:48px 20px;scroll-margin-top:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:22px;\">\n      <span style=\"font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.16em;color:#C6FF00;-webkit-text-stroke:1px #0a0a0a;\">01<\u002Fspan>\n      <h2 style=\"margin:0;font-weight:900;font-size:clamp(24px,4vw,34px);letter-spacing:-0.01em;\">關於我 <span style=\"font-family:'Archivo',sans-serif;font-weight:500;font-size:0.6em;color:#5a5a52;\">About<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px;font-size:16px;line-height:1.9;color:#1a1a18;\">\n      <p style=\"margin:0;\">曾任職於數位音樂內容平台，長期投入行銷宣傳、社群經營與內容企劃領域，累積多年音樂產業相關經驗。擁有 <b style=\"background:linear-gradient(transparent 60%,#C6FF00 60%);\">14 年以上<\u002Fb>數位內容、品牌行銷與專案管理經驗，深耕音樂產業<b style=\"background:linear-gradient(transparent 60%,#C6FF00 60%);\">超過 10 年<\u002Fb>，曾任 StreetVoice 行銷社群統籌，參與音樂平台營運、音樂節、演唱會、音樂獎項及品牌合作等多元專案。<\u002Fp>\n      <p style=\"margin:0;\">擅長內容策略規劃、社群經營、媒體宣傳、公關合作及跨部門專案整合，熟悉從企劃發想、執行推進到成效追蹤的完整流程。近年以 Freelance 身份參與音樂專案，持續協助創作者與品牌建立更具影響力的市場溝通，期望透過自身經驗與企劃能力，協助更多優秀的作品與創作者被更多人看見。<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SKILLS -->\n  <section id=\"skills\" data-screen-label=\"Skills\" style=\"background:#0a0a0a;color:#ffffff;scroll-margin-top:60px;\">\n    <div style=\"max-width:960px;margin:0 auto;padding:56px 20px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:32px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.16em;color:#C6FF00;\">02<\u002Fspan>\n        <h2 style=\"margin:0;font-weight:900;font-size:clamp(24px,4vw,34px);letter-spacing:-0.01em;color:#fff;\">技能專長 <span style=\"font-family:'Archivo',sans-serif;font-weight:500;font-size:0.6em;color:#C6FF00;\">Skills<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;\">\n        <div style=\"border:1px solid #2a2a26;border-radius:14px;padding:22px;background:#141412;\">\n          <h3 style=\"margin:0 0 12px;font-size:15px;font-weight:700;color:#C6FF00;\">程式與數位工具<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.85;color:#d4d4cc;\">Adobe 系列：Photoshop、Illustrator<br>影音剪輯：Premiere Pro、CapCut<br>Office：Word、PowerPoint、Excel<br>網站／APP 前期企劃與內容架構規劃、UI／UX 流程設計與優化、專案時程管理、功能測試與內容檢核。<\u002Fp>\n          <p style=\"margin:14px 0 0;font-size:13px;color:#8a8a82;\">中打 ≈ 120 字／min　·　英打 ≈ 50 words／min<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #2a2a26;border-radius:14px;padding:22px;background:#141412;\">\n          <h3 style=\"margin:0 0 12px;font-size:15px;font-weight:700;color:#C6FF00;\">社群運用<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.85;color:#d4d4cc;\">熟悉 Facebook、Instagram、YouTube 等社群平台操作，具備 GA 數據分析、Facebook 廣告投放及 SEO 關鍵字優化經驗。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #2a2a26;border-radius:14px;padding:22px;background:#141412;\">\n          <h3 style=\"margin:0 0 12px;font-size:15px;font-weight:700;color:#C6FF00;\">宣傳公關 · 活動執行<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.85;color:#d4d4cc;\">新聞稿撰寫、發布與宣傳內容規劃；媒體通告安排、媒體關係維護與宣傳窗口對接；公關活動、演唱會、音樂節及專輯宣傳企劃執行、品牌異業合作，熟悉音樂產業宣傳流程與專案時程管理。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FREELANCE -->\n  <section id=\"freelance\" data-screen-label=\"Freelance\" style=\"max-width:960px;margin:0 auto;padding:56px 20px;scroll-margin-top:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:10px;\">\n      <span style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.16em;color:#C6FF00;-webkit-text-stroke:1px #0a0a0a;\">03<\u002Fspan>\n      <h2 style=\"margin:0;font-weight:900;font-size:clamp(20px,3.4vw,30px);letter-spacing:-0.01em;line-height:1.25;\">現階段以 freelance 形式進行音樂產業相關專案合作<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 28px;font-size:15px;color:#5a5a52;font-weight:500;\">（音樂專案行銷企劃、宣傳、社群投放、商務經紀）<\u002Fp>\n\n    <ul id=\"freelance-list\" style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:0;border-top:2px solid #0a0a0a;\"><\u002Ful>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE -->\n  <section id=\"experience\" data-screen-label=\"Experience\" style=\"background:#f4f4f0;scroll-margin-top:60px;border-top:2px solid #0a0a0a;border-bottom:2px solid #0a0a0a;\">\n    <div style=\"max-width:960px;margin:0 auto;padding:56px 20px;\">\n      <button id=\"exp-toggle\" type=\"button\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;border:2px solid #0a0a0a;border-radius:16px;padding:22px 24px;cursor:pointer;text-align:left;box-shadow:4px 4px 0 #0a0a0a;font-family:inherit;\">\n        <span style=\"display:flex;align-items:flex-start;gap:12px;\">\n          <span style=\"color:#9bbf00;font-size:20px;line-height:1.2;\">04<\u002Fspan>\n          <span>\n            <span style=\"display:block;font-size:clamp(18px,3vw,24px);font-weight:900;letter-spacing:-0.01em;color:#0a0a0a;\">工作經歷<\u002Fspan>\n            <span style=\"display:block;font-size:13px;font-weight:500;color:#5a5a52;margin-top:3px;font-family:'Archivo',sans-serif;letter-spacing:0.04em;\">Work Experience｜點擊收合<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fspan>\n        <span id=\"exp-toggle-icon\" style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:#C6FF00;border:2px solid #0a0a0a;font-size:18px;font-weight:900;transition:transform 0.25s;\">▾<\u002Fspan>\n      <\u002Fbutton>\n      <div id=\"exp-body\" style=\"display:grid;grid-template-columns:1fr;gap:20px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MUSIC INDUSTRY PROJECTS -->\n  <section id=\"projects\" data-screen-label=\"Projects\" style=\"max-width:960px;margin:0 auto;padding:56px 20px;scroll-margin-top:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n      <span style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.16em;color:#C6FF00;-webkit-text-stroke:1px #0a0a0a;\">05<\u002Fspan>\n      <h2 style=\"margin:0;font-weight:900;font-size:clamp(24px,4vw,34px);letter-spacing:-0.01em;\">音樂產業專案與行銷統籌<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 32px;font-size:15px;color:#5a5a52;font-weight:500;\">Music industry projects &amp; marketing leadership<\u002Fp>\n    <div id=\"proj-groups\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- AWARDS / FEATURE -->\n  <section id=\"awards\" data-screen-label=\"Awards\" style=\"background:#0a0a0a;color:#fff;scroll-margin-top:60px;\">\n    <div style=\"max-width:960px;margin:0 auto;padding:56px 20px;\">\n      <h2 style=\"margin:0 0 18px;font-weight:900;font-size:clamp(22px,3.6vw,30px);line-height:1.25;\">\n        ☆ StreetVoice 街聲年度音樂趨勢大獎\n      <\u002Fh2>\n      <div style=\"border:1px solid #2a2a26;overflow:hidden;border-radius:10px;background:#141412;margin-bottom:24px;height:300px;background:linear-gradient(135deg, #1a1a18 0%, #2a2a26 100%);\"><\u002Fdiv>\n      <p style=\"margin:0 0 16px;font-size:15px;line-height:1.9;color:#d4d4cc;\">致力於推動新生代原創音樂作品走向更大的舞台，透過內容策劃、社群行銷與媒體宣傳，提升音樂作品與創作者的市場能見度與影響力。<\u002Fp>\n      <p style=\"margin:0 0 24px;font-size:15px;line-height:1.9;color:#d4d4cc;\"><b style=\"color:#fff;\">參與規劃 2024 首屆及 2025 第二屆<\u002Fb>，負責獎項企劃統籌、頒獎典禮現場執行，以及媒體宣傳與社群行銷操作，打造具話題性與產業影響力的年度音樂指標活動。<\u002Fp>\n\n      <div style=\"border-top:1px solid #2a2a26;padding-top:24px;\">\n        <p style=\"margin:0 0 12px;font-size:15px;line-height:1.9;color:#d4d4cc;\">☆ 任職 friDay 音樂期間，協助執行 <b style=\"color:#fff;\">「絕對音樂．絕對星盛事」2017 hito 流行音樂獎<\u002Fb>後台直擊直播工作。<\u002Fp>\n        <p style=\"margin:0;font-size:14px;line-height:1.9;color:#8a8a82;\">專訪藝人包括 BOXING、Bii 畢書盡、Christopher、Erika、Miss Ko、丁噹、方大同、王心凌、艾怡良、安心亞、兄弟本色、李千娜、李佳薇、李榮浩、林俊傑、周湯豪、韋禮安、范瑋琪、周興哲、鼓鼓、陳勢安、郭靜、楊乃文、楊丞琳、獅子合唱團、魏如萱 等。<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:28px;\">\n        <div style=\"border:1px solid #2a2a26;overflow:hidden;border-radius:10px;background:#141412;height:200px;background:linear-gradient(135deg, #1a1a18 0%, #2a2a26 100%);\"><\u002Fdiv>\n        <div style=\"border:1px solid #2a2a26;overflow:hidden;border-radius:10px;background:#141412;height:200px;background:linear-gradient(135deg, #1a1a18 0%, #2a2a26 100%);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STREETVOICE PLATFORM CASES -->\n  <section id=\"sv-cases\" data-screen-label=\"SV Cases\" style=\"max-width:960px;margin:0 auto;padding:48px 20px 8px;scroll-margin-top:72px;\">\n    <button id=\"sv-toggle\" type=\"button\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;border:2px solid #0a0a0a;border-radius:16px;padding:22px 24px;cursor:pointer;text-align:left;box-shadow:4px 4px 0 #C6FF00;font-family:inherit;\">\n      <span style=\"display:flex;align-items:flex-start;gap:12px;\">\n        <span style=\"color:#9bbf00;font-size:20px;line-height:1.2;\">☆<\u002Fspan>\n        <span>\n          <span style=\"display:block;font-size:clamp(18px,3vw,24px);font-weight:900;letter-spacing:-0.01em;color:#0a0a0a;\">StreetVoice 平台企劃案例<\u002Fspan>\n          <span style=\"display:block;font-size:13px;font-weight:500;color:#5a5a52;margin-top:3px;\">拍拍手 PAPOAR 打賞功能 · 畢業歌徵選年度企劃｜點擊展開<\u002Fspan>\n \n          <span style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:14px;background:#C6FF00;border:2px solid #0a0a0a;border-radius:8px;padding:1px 8px;\">${e.n}<\u002Fspan>\n          <h3 style=\"margin:0;font-size:clamp(18px,2.6vw,22px);font-weight:900;\">${e.role}<\u002Fh3>\n          <span style=\"font-size:15px;font-weight:500;color:#3a3a34;\">${e.org}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:0 0 14px;font-family:'Archivo',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.04em;color:#5a5a52;\">${e.time}<\u002Fp>\n        <p style=\"margin:0 0 16px;font-size:15px;line-height:1.85;color:#1a1a18;\">${e.lead}<\u002Fp>\n        <ol style=\"margin:0 0 18px;padding-left:0;list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:8px 20px;\">\n          ${e.points.map((p,i)=>`<li style=\"font-size:14px;line-height:1.7;color:#2a2a26;display:flex;gap:8px;\"><span style=\"flex:none;font-family:'Archivo',sans-serif;font-weight:700;color:#9bbf00;\">${String(i+1).padStart(2,'0')}<\u002Fspan><span>${p}<\u002Fspan><\u002Fli>`).join('')}\n        <\u002Fol>\n        <p style=\"margin:0;font-size:13px;font-weight:700;color:#0a0a0a;background:#f4f4f0;border-radius:8px;padding:10px 14px;border:1px solid #e2e2da;\"><span style=\"color:#9bbf00;\">工作技能<\u002Fspan>　${e.skill}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Farticle>`).join('');\n}\n\nconst expToggle = document.getElementById('exp-toggle');\nconst expIcon = document.getElementById('exp-toggle-icon');\nif (expToggle && expBody) {\n  expToggle.addEventListener('click', () => {\n    const open = expBody.style.display !== 'none';\n    expBody.style.display = open ? 'none' : 'grid';\n    if (expIcon) expIcon.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';\n  });\n}\n\nconst groups = [\n  {title:'音樂宣傳執行', items:[\n    '2026.01 頑童 MJ116《OGS》台中洲際演唱會｜宣傳執行',\n    '2025.12 鄭興《尋找鄭先生》｜網路宣傳執行',\n    '2025.10 Lola Amour 媒體見面會｜活動規劃執行',\n    '2025.09 Ed Sheeran《PLAY》搶聽會｜活動規劃執行',\n  ]},\n  {title:'音樂節 / 大型活動行銷統籌', items:[\n    '2019 Simple Urban+ 簡單生活節｜行銷宣傳統籌',\n    '2020 簡單生活節｜行銷宣傳統籌',\n    '2019–2022 金音獎｜協力網路宣傳執行',\n    '2023 StreetVoice × 芒果醬 × 好丘《貝愛的人修成正果》粉絲見面會｜活動統籌',\n    '2024 鶴 The Crane 年度專場《Meet Me At The Dining Room》｜行銷社群規劃',\n    '2025 竇靖童《狀況外》巡迴演唱會 台北站｜行銷社群規劃',\n  ]},\n  {title:'音樂徵選 / 原創企劃統籌', items:[\n    '2020 街聲首屆畢業歌徵選｜專案籌劃，第二屆徵件突破百件',\n    '2020、2021 Vans Musicians Wanted｜音樂人徵選企劃執行',\n    '2021 agnès b.《LISTEN!! 原創音樂線上募集大賞》｜徵件數突破千件',\n    '2022 MUSIC MAKER 音樂主理人｜音樂徵選企劃',\n    '2022、2023 金牌啤酒百萬代言人金牌原創音樂徵選｜專案執行',\n    '2023《1500 聲量音樂祭》五月天瑪莎大師講座｜徵選規劃',\n  ]},\n  {title:'品牌異業合作 / 音樂策展', items:[\n    '2020 荷爾蒙少年《黑色台北 Urban Noir》發片企劃，串聯在地酒吧 Draft Land 整合規劃',\n    '2021《大團誕生》我要上 COVER：荷爾蒙少年｜企劃統籌',\n    '2021 拍拍手《萬聖節抓鬼！LÜCY 近距離專場》｜網頁活動企劃執行',\n    '2022《臺北街角遇見設計－臺北繞個路》｜音樂策展規劃',\n    '2022 陶喆《自選 25：BRING THE LIGHT IN》珍藏演唱會｜徵選宣傳執行',\n    '2023 LINION《梨民活動中心》專場｜結合站上電商開站行銷規劃',\n  ]},\n  {title:'行銷社群規劃統籌', items:[\n    '2019–2025.5 StreetVoice 行銷社群統籌',\n    '2019、2020、2023 簡單生活節 行銷社群統籌',\n    '2023、2024 StreetVoice Park Park Carnival 叭叭嘉年華 行銷社群統籌',\n    '2025 有朝一日音樂節 行銷社群統籌',\n    '2025 土屋安娜巡迴演唱會 台北站 行銷社群統籌',\n    '2025 秋OUT音樂節 社群執行',\n    '2025 樂團祭活動 社群統籌規劃',\n  ]},\n];\n\nconst pgEl = document.getElementById('proj-groups');\nif (pgEl) {\n  pgEl.innerHTML = groups.map(g => `\n    <div style=\"border:2px solid #0a0a0a;border-radius:16px;padding:24px;background:#fff;\">\n      <h3 style=\"margin:0 0 16px;font-size:17px;font-weight:900;display:flex;align-items:center;gap:8px;\"><span style=\"color:#9bbf00;\">■<\u002Fspan>${g.title}<\u002Fh3>\n      <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:11px;\">\n        ${g.items.map(it=>`<li style=\"font-size:14px;line-height:1.7;color:#1a1a18;display:flex;gap:9px;\"><span style=\"flex:none;color:#C6FF00;-webkit-text-stroke:1px #0a0a0a;font-weight:900;\">·<\u002Fspan><span>${it}<\u002Fspan><\u002Fli>`).join('')}\n      <\u002Ful>\n    <\u002Fdiv>`).join('');\n}\n\nconst omusicToggle = document.getElementById('omusic-toggle');\nconst omusicIcon = document.getElementById('omusic-toggle-icon');\nconst omusicBody = document.getElementById('omusic-body');\nif (omusicToggle && omusicBody) {\n  omusicToggle.addEventListener('click', () => {\n    const open = omusicBody.style.display !== 'none';\n    omusicBody.style.display = open ? 'none' : 'block';\n    if (omusicIcon) omusicIcon.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';\n  });\n}\n\nconst svToggle = document.getElementById('sv-toggle');\nconst svIcon = document.getElementById('sv-toggle-icon');\nconst svBody = document.getElementById('sv-cases-body');\nif (svToggle && svBody) {\n  svToggle.addEventListener('click', () => {\n    const open = svBody.style.display !== 'none';\n    svBody.style.display = open ? 'none' : 'block';\n    if (svIcon) svIcon.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';\n  });\n}\n\n// Sticky nav\nconst navLinks = [...document.querySelectorAll('nav a[href^=\"#\"]')];\nconst map = {};\nnavLinks.forEach(a => { const id = a.getAttribute('href').slice(1); if(id) map[id]=a; });\nconst obs = new IntersectionObserver((entries) => {\n  entries.forEach(en => {\n    const a = map[en.target.id];\n    if (!a) return;\n    if (en.isIntersecting) {\n      navLinks.forEach(x => { x.style.background='transparent'; x.style.color='#0a0a0a'; });\n      a.style.background = '#C6FF00';\n      a.style.color = '#0a0a0a';\n    }\n  });\n}, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });\n['about','skills','freelance','experience','projects','awards','sv-cases','omusic'].forEach(id => {\n  const el = document.getElementById(id); if (el) obs.observe(el);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
